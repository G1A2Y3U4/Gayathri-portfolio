    <script>
      // Apply initial theme from localStorage to avoid flash
      (function(){
        try{
          const theme = localStorage.getItem('theme');
          if(theme === 'dark') document.documentElement.classList.add('dark');
        }catch(e){}
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
